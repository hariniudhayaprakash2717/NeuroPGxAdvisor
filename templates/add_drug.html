<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Drug | NeuroPGx Advisor</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Poppins, sans-serif;
      }

      body {
        background: #eef4fb;
      }

      .navbar {
        height: 75px;
        background: #0f172a;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 40px;
        color: white;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 28px;
        font-weight: 700;
      }

      .logo i {
        color: #38bdf8;
        font-size: 34px;
      }

      .logout {
        background: #ef4444;
        padding: 10px 18px;
        border-radius: 8px;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }

      .container {
        width: 65%;
        margin: 35px auto;
      }

      .card {
        background: white;
        padding: 35px;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      .card h1 {
        margin-bottom: 25px;
        color: #0f172a;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 13px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
      }

      textarea {
        resize: none;
        height: 90px;
      }

      .btn {
        margin-top: 20px;
        background: #16a34a;
        color: white;
        padding: 14px;
        border: none;
        width: 100%;
        border-radius: 10px;
        font-size: 17px;
        cursor: pointer;
        font-weight: 600;
      }

      .btn:hover {
        background: #15803d;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">
        <i class="fa-solid fa-dna"></i>
        <span>NeuroPGx Advisor</span>
      </div>

      <a href="/druginfo" class="logout">
        <i class="fa-solid fa-arrow-left"></i>

        Back
      </a>
    </nav>

    <div class="container">
      <div class="card">
        <h1>💊 Add New Drug</h1>

        <form action="/save_drug" method="POST">
          <div class="form-group">
            <label>Disease</label>
            <input type="text" name="disease" required />
          </div>

          <div class="form-group">
            <label>Gene</label>
            <input type="text" name="gene" required />
          </div>

          <div class="form-group">
            <label>Phenotype</label>
            <input type="text" name="phenotype" required />
          </div>

          <div class="form-group">
            <label>Drug Name</label>
            <input type="text" name="drug" required />
          </div>

          <div class="form-group">
            <label>Recommendation</label>

            <select name="recommendation">
              <option>Standard Dose</option>
              <option>Reduce Dose</option>
              <option>Increase Dose</option>
              <option>Avoid</option>
              <option>Monitor Therapy</option>
              <option>Consider Alternative</option>
            </select>
          </div>

          <div class="form-group">
            <label>Alternative Drug</label>
            <input type="text" name="alternative" />
          </div>

          <div class="form-group">
            <label>Reason</label>

            <textarea name="reason"></textarea>
          </div>

          <div class="form-group">
            <label>Evidence Level</label>

            <select name="evidence">
              <option>High</option>
              <option>Moderate</option>
              <option>Low</option>
            </select>
          </div>

          <button class="btn">
            <i class="fa-solid fa-floppy-disk"></i>

            Save Drug
          </button>
        </form>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add User | NeuroPGx Advisor</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Poppins, sans-serif;
      }

      body {
        background: #eef4fb;
      }

      .navbar {
        height: 75px;
        background: #0f172a;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 40px;
        color: white;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 28px;
        font-weight: 700;
      }

      .logo i {
        color: #38bdf8;
        font-size: 34px;
      }

      .logout {
        background: #ef4444;
        padding: 10px 18px;
        border-radius: 8px;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }

      .container {
        width: 60%;
        margin: 40px auto;
      }

      .card {
        background: white;
        padding: 35px;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      .card h1 {
        margin-bottom: 25px;
        color: #0f172a;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input,
      select {
        width: 100%;
        padding: 13px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
      }

      .btn {
        margin-top: 20px;
        background: #16a34a;
        color: white;
        padding: 14px;
        border: none;
        width: 100%;
        border-radius: 10px;
        font-size: 17px;
        cursor: pointer;
        font-weight: 600;
      }

      .btn:hover {
        background: #15803d;
      }

      .back {
        display: inline-block;
        margin-top: 20px;
        text-decoration: none;
        color: #2563eb;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">
        <i class="fa-solid fa-dna"></i>

        <span>NeuroPGx Advisor</span>
      </div>

      <a href="/admin" class="logout">
        <i class="fa-solid fa-arrow-left"></i>

        Back
      </a>
    </nav>

    <div class="container">
      <div class="card">
        <h1>
          <i class="fa-solid fa-user-plus"></i>

          Add New User
        </h1>

        <form action="/save_user" method="POST">
          <div class="form-group">
            <label>User ID</label>

            <input type="text" name="userid" required />
          </div>

          <div class="form-group">
            <label>Username</label>

            <input type="text" name="username" required />
          </div>

          <div class="form-group">
            <label>Password</label>

            <input type="password" name="password" required />
          </div>

          <div class="form-group">
            <label>Role</label>

            <select name="role">
              <option>System Administrator</option>

              <option>Doctor</option>

              <option>Researcher</option>

              <option>Student</option>
            </select>
          </div>

          <div class="form-group">
            <label>Full Name</label>

            <input type="text" name="fullname" required />
          </div>

          <div class="form-group">
            <label>Department</label>

            <input type="text" name="department" required />
          </div>

          <div class="form-group">
            <label>Email</label>

            <input type="email" name="email" required />
          </div>

          <button class="btn">
            <i class="fa-solid fa-floppy-disk"></i>

            Save User
          </button>
        </form>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | NeuroPGx Advisor</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>

            *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
            }

            body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);

            overflow:hidden;

            position:relative;

            }

            .blur{

            position:absolute;

            border-radius:50%;

            filter:blur(120px);

            opacity:.35;

            }

            .blur1{

            width:350px;

            height:350px;

            background:#38bdf8;

            top:-100px;

            left:-100px;

            }

            .blur2{

            width:350px;

            height:350px;

            background:#7c3aed;

            bottom:-100px;

            right:-100px;

            }

            .login-card{

            width:450px;

            background:rgba(255,255,255,.95);

            padding:40px;

            border-radius:25px;

            box-shadow:0 20px 45px rgba(0,0,0,.25);

            backdrop-filter:blur(20px);

            z-index:10;

            animation:fadeIn .8s ease;

            }

            @keyframes fadeIn{

            from{

            opacity:0;

            transform:translateY(40px);

            }

            to{

            opacity:1;

            transform:translateY(0);

            }

            }
            .logo{

      display:flex;

      flex-direction:column;

      align-items:center;

      justify-content:center;

      text-align:center;

      margin-bottom:25px;

      }

      .logo i{

      font-size:65px;

      color:#2563eb;

      margin-bottom:12px;

      }

      .logo h1{

      font-size:32px;

      font-weight:700;

      color:#1e293b;

      margin-bottom:8px;

      line-height:1.2;

      }

      .subtitle{

      font-size:14px;

      color:#64748b;

      margin-bottom:8px;

      line-height:1.6;

      text-align:center;

      }

      .role{

      font-size:13px;

      font-weight:600;

      color:#2563eb;

      text-align:center;

      line-height:1.6;

      margin-top:5px;

      }

            .subtitle{

            font-size:14px;

            color:#64748b;

            margin-bottom:10px;

            }

            .role{
              display:block;
              text-align:center;
              font-size:13px;
              color:#2563eb;
              font-weight:600;
              margin-top:8px;
              line-height:22px;
              word-wrap:break-word;

      }

            .input-box{

            margin-bottom:20px;

            }

            .input-box label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

            color:#334155;

            }

            .input-box input{

            width:100%;

            padding:15px;

            border-radius:12px;

            border:1px solid #cbd5e1;

            font-size:15px;

            outline:none;

            transition:.3s;

            }

            .input-box input:focus{

            border-color:#2563eb;

            box-shadow:0 0 8px rgba(37,99,235,.3);

            }

            .login-btn{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            background:#2563eb;

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:.3s;

            }

            .login-btn:hover{

            background:#1d4ed8;

            transform:translateY(-2px);

            }

            .error{

            margin-top:15px;

            text-align:center;

            color:red;

            font-size:14px;

            }

            .footer{

            margin-top:25px;

            text-align:center;

            font-size:13px;

            color:#64748b;

            }
            }

            .footer i{

            color:#2563eb;

            margin-right:5px;

            }
    </style>
  </head>

  <body>
    <div class="blur blur1"></div>

    <div class="blur blur2"></div>

    <div class="login-card">
      <div class="logo">
        <i class="fa-solid fa-dna"></i>

        <h1>NeuroPGx Advisor</h1>

        <p class="subtitle">
          Pharmacogenomics Clinical Decision Support System
        </p>
        <p class="role">Administrator | Doctor | Researcher</p>
      </div>

      <form action="/login" method="POST">
        <div class="input-box">
          <label>
            <i class="fa-solid fa-user"></i>

            Username
          </label>

          <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
          />
        </div>

        <div class="input-box">
          <label>
            <i class="fa-solid fa-lock"></i>

            Password
          </label>

          <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
          />
        </div>

        <button type="submit" class="login-btn">
          <i class="fa-solid fa-right-to-bracket"></i>

          Login
        </button>

        {% if error %}

        <div class="error">
          <i class="fa-solid fa-circle-exclamation"></i>

          {{ error }}
        </div>

        {% endif %}
      </form>

      <div class="footer">
        <p>
          <i class="fa-solid fa-hospital"></i>

          Clinical Decision Support System
        </p>

        <p>Version 1.0</p>

        <p>© 2026 NeuroPGx Advisor</p>
      </div>
    </div>
  </body>
</html>
